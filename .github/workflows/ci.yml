name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        # Los unit tests mockean los repositorios (no tocan la DB), pero la
        # cadena de imports carga @nestjs/config y valida el entorno con joi.
        # Estos valores son dummy solo para pasar esa validacion.
        env:
          APP_NAME: swcgv-test
          PORT: "8000"
          IS_HTTPS: "false"
          MAIN_DATABASE_HOST: localhost
          MAIN_DATABASE_PORT: "5432"
          MAIN_DATABASE_USERNAME: test
          MAIN_DATABASE_PASSWORD: test
          MAIN_DATABASE_NAME: test
          MAIN_DATABASE_SYNCHRONIZE: "false"
          MAIN_DATABASE_SSL: "false"
          MAIN_DATABASE_TIMEZONE: "+00:00"
          CONTENT_SECURITY_POLICY: "false"
          COOKIE_KEY: test-cookie-key
          CORS_ORIGINS: http://localhost:3000
          CORS_CREDENTIALS: "false"
          CORS_METHODS: "*"
          JWT_ACCESS_TOKEN_SECRET: test-jwt-secret
        run: npm test

      - name: Build
        run: npm run build

      - name: Dependency audit
        # No bloqueante: hay vulnerabilidades high sin fix no-breaking, tratadas
        # como excepciones aceptadas (ver docs/adr/0001 y progreso/fase-1.2.md).
        # Visible en los logs para detectar nuevas o cuando aparezca un fix.
        continue-on-error: true
        run: npm audit --audit-level=high

  secret-scan:
    # Escaneo de secretos con gitleaks. Reemplaza en CI al hook local de
    # pre-commit, bloqueado en la maquina de desarrollo por una politica
    # Windows Application Control (ver progreso/fase-1.2.md).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        run: |
          curl -sSfL -o gitleaks.tar.gz https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          ./gitleaks detect --source . --redact --exit-code 1
